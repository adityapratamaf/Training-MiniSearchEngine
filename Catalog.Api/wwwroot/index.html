<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <title>Mini Search Engine Frontend</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #1a2242;
      --text: #eef2ff;
      --muted: #aab4d6;
      --accent: #6ea8fe;
      --border: #2a3566;
      --danger: #ff7b7b;
      --success: #7ee787;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0e1530 100%);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    .card {
      background: rgba(18, 25, 51, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full { grid-column: 1 / -1; }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    input, select, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 14px;
      font-size: 14px;
    }

    input::file-selector-button {
      background: var(--accent);
      color: #06122e;
      border: 0;
      padding: 8px 12px;
      border-radius: 8px;
      margin-right: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    button {
      cursor: pointer;
      background: var(--accent);
      color: #06122e;
      font-weight: 700;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .secondary {
      background: transparent;
      color: var(--text);
    }

    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }
    .status.muted { color: var(--muted); }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    .results {
      display: grid;
      gap: 14px;
    }

    .product {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: rgba(255,255,255,0.02);
    }

    .product h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
    }

    .badge {
      background: #223061;
      color: #dbe7ff;
      border: 1px solid #33488c;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .description {
      color: var(--muted);
      line-height: 1.5;
    }

    .pagination {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      text-align: center;
      color: var(--muted);
    }

    code.inline {
      background: rgba(255,255,255,0.07);
      padding: 2px 6px;
      border-radius: 6px;
      color: #dce8ff;
    }

    .hidden {
      display: none !important;
    }

    /* KEYWORD SUGGESTION */
    .suggestion-wrapper {
      position: relative;
    }

    .suggestion-box {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 100;
    }

    .suggestion-item {
      padding: 12px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      background: var(--panel);
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background: var(--panel-2);
    }

    .suggestion-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .suggestion-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .hidden {
      display: none !important;
    }

    /* SELECT CATEGORIES */
    .select2-container {
      width: 100% !important;
    }

    .select2-container--default .select2-selection--single {
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      display: flex;
      align-items: center;
    }

    .select2-container--default .select2-selection--single .select2-selection__rendered {
      color: var(--text);
      line-height: 44px;
      padding-left: 14px;
    }

    .select2-container--default .select2-selection--single .select2-selection__arrow {
      height: 44px;
    }

    .select2-dropdown {
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      overflow: hidden;
    }

    .select2-search__field {
      background: var(--panel-2) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
    }

    .select2-results__option {
      color: var(--text);
    }

    .select2-container--default .select2-results__option--highlighted.select2-results__option--selectable {
      background: var(--accent);
      color: #06122e;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ECommerce</h1>
    <div class="subtitle">Mini Search Engine</div>

    <div class="grid">
      <div class="card">
        <h2>Search By Text</h2>
        <div class="form-grid">
          <div class="full hidden">
            <label for="apiBaseUrl">Base URL API</label>
            <input id="apiBaseUrl" value="http://ecommerce.adityapratamaf.my.id" readonly />
          </div>

          <div class="full suggestion-wrapper">
            <label for="queryParam">Keyword</label>
            <input id="queryParam" placeholder="Keyword" autocomplete="off" />
            <div id="suggestionBox" class="suggestion-box hidden"></div>
          </div>

          <div>
            <label for="category">Category</label>
            <select id="category">
              <option value="">All Category</option>
            </select>
          </div>

          <div>
            <label for="sortPrice">Sort Price</label>
            <select id="sortPrice">
              <option value="">Relevance</option>
              <option value="asc">Lowest Price</option>
              <option value="desc">Highest Price</option>
            </select>
          </div>

          <div>
            <label for="minPrice">Min Price</label>
            <input id="minPrice" type="number" min="0" step="0.01" placeholder="0" />
          </div>

          <div>
            <label for="maxPrice">Max Price</label>
            <input id="maxPrice" type="number" min="0" step="0.01" placeholder="1000000" />
          </div>

          <div>
            <label for="page">Page</label>
            <input id="page" type="number" min="1" value="1" />
          </div>

          <div>
            <label for="pageSize">Page Size</label>
            <input id="pageSize" type="number" min="1" value="10" />
          </div>

          <div class="full">
            <button id="searchBtn">Search</button>
          </div>
        </div>

        <div id="searchStatus" class="status muted"></div>
      </div>

      <div class="card">
        <h2>Search By Image</h2>
        <div class="form-grid">
          <div class="full">
            <label for="imageFile">Upload Image</label>
            <input id="imageFile" type="file" accept="image/*" />
          </div>

          <div>
            <label for="imagePage">Page</label>
            <input id="imagePage" type="number" min="1" value="1" />
          </div>

          <div>
            <label for="imagePageSize">Page Size</label>
            <input id="imagePageSize" type="number" min="1" value="10" />
          </div>

          <div class="full">
            <button id="imageSearchBtn">Search</button>
          </div>
        </div>

        <div id="imageStatus" class="status muted hidden">API Allow Origin <code class="inline">http://localhost:5500</code> / <code class="inline">http://127.0.0.1:5500</code>.</div>
      </div>
    </div>

    <div class="card" style="margin-top: 20px;">
      <div class="results-header">
        <h2 style="margin:0;">Result</h2>
        <div id="resultMeta" class="meta">Not Available Searching.</div>
        <div id="requestTimeMeta" class="meta" style="margin-top:4px;">Request Time : -</div>
      </div>

      <div id="results" class="results">
        <div class="empty">Result Searching.</div>
      </div>

      <div class="pagination">
        <button id="prevBtn" class="secondary">Prev</button>
        <button id="nextBtn" class="secondary">Next</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    const state = {
    currentPage: 1,
    pageSize: 10,
    total: 0,
    items: []
    };

    const el = {
    queryParam: document.getElementById('queryParam'),
    category: document.getElementById('category'),
    sortPrice: document.getElementById('sortPrice'),
    minPrice: document.getElementById('minPrice'),
    maxPrice: document.getElementById('maxPrice'),
    page: document.getElementById('page'),
    pageSize: document.getElementById('pageSize'),
    searchBtn: document.getElementById('searchBtn'),
    results: document.getElementById('results'),
    resultMeta: document.getElementById('resultMeta')
    };

    function escapeHtml(v){
    return String(v)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    }

    function currency(v){
    return new Intl.NumberFormat('id-ID',{
        style:'currency',
        currency:'IDR',
        maximumFractionDigits:0
    }).format(v)
    }

    function buildQuery(pageOverride){
    const params = new URLSearchParams()

    const q = el.queryParam.value.trim()
    const category = el.category.value
    const sort = el.sortPrice.value

    if(q) params.append("queryParam",q)
    if(category) params.append("category",category)
    if(sort) params.append("sortPrice",sort)

    params.append("page",pageOverride ?? el.page.value)
    params.append("pageSize",el.pageSize.value)

    return params
    }

    function render(data){

    state.total = data.total
    state.currentPage = data.page
    state.pageSize = data.pageSize
    state.items = data.items

    el.resultMeta.textContent =
    `Page ${state.currentPage} • Total ${state.total}`

    if(!state.items.length){
        el.results.innerHTML =
        `<div class="empty">No Product</div>`
        return
    }

    el.results.innerHTML =
    state.items.map(p => `
    <div class="product">
        <h3>${escapeHtml(p.name)}</h3>
        <div class="row">
        <span class="badge">${p.category}</span>
        <span class="badge">${currency(p.price)}</span>
        </div>
        <div class="description">${escapeHtml(p.description)}</div>
    </div>
    `).join('')
    }

    async function loadCategories(){

    try{

        const res = await fetch(`${API_BASE}/api/products/categories`)

        if(!res.ok) throw new Error(res.status)

        const categories = await res.json()

        el.category.innerHTML =
        `<option value="">All Category</option>`

        categories.forEach(c=>{
        const opt=document.createElement("option")
        opt.value=c
        opt.textContent=c
        el.category.appendChild(opt)
        })

    }catch(err){

        console.error("Load category error",err)

    }

    }

    async function search(pageOverride){

    const query = buildQuery(pageOverride)

    const url =
    `${API_BASE}/api/products/search-by-text?${query}`

    try{

        const res = await fetch(url)

        if(!res.ok) throw new Error(res.status)

        const data = await res.json()

        render(data)

    }catch(err){

        console.error("Search error",err)

    }

    }

    el.searchBtn.addEventListener("click",()=>{
    search()
    })

    loadCategories()
    </script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</body>
</html>
